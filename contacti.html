<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Магазин ковриков</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 КОНТАКТЫ</h1>
            <p>Свяжитесь с нами любым удобным способом</p>
        </header>
        
        <nav>
            <a href="index.html">🏠 Главная</a>
            <a href="catalog.html">📦 Каталог</a>
            <a href="contacti.html">📞 Контакты</a>
        </nav>
        
        <main>
            <div class="contact-form">
                <h2>✉️ Напишите нам</h2>
                <form action="#" method="post">
                    <div class="form-group">
                        <label>Ваше ФИО</label>
                        <input type="text" placeholder="Иванов Иван Иванович">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="ivan@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <div class="form-group">
                        <label>Тема сообщения</label>
                        <input type="text" placeholder="Вопрос о товаре">
                    </div>
                    
                    <div class="form-group">
                        <label>Сообщение</label>
                        <textarea rows="5" placeholder="Ваше сообщение..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn">📤 Отправить</button>
                </form>
            </div>
            
            <div class="store-info">
                <h3>🏪 Наш магазин</h3>
                <p>📍 Адрес: Зеленая 22, Москва</p>
                <p>📞 Телефон: +7 (999) 987-65-43</p>
                <p>✉️ Email: kovriki@mail.ru</p>
                <p>🕐 Режим работы: Пн-Вс 10:00 - 21:00</p>
            </div>
            
            <div class="map-container">
                <iframe src="https://yandex.ru/map-widget/v1/?ll=37.514713%2C55.811434&mode=search&sll=37.514713%2C55.811434&sspn=0.195142%2C0.174004&z=12.4" 
                        width="100%" height="400" frameborder="0" allowfullscreen="true">
                </iframe>
            </div>
        </main>
        
        <footer>
            <p>Все права защищены &copy; 2026 Магазин ковриков для мыши</p>
        </footer>
    </div>
    
    <div class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>
    
    <script>
        window.addEventListener('scroll', function() {
            const scrollTop = document.querySelector('.scroll-top');
            if (window.pageYOffset > 300) {
                scrollTop.classList.add('show');
            } else {
                scrollTop.classList.remove('show');
            }
        });
    </script>
</body>
</html>
